<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <!-- Icon: magnifying glass grabbing a document -->
  <g transform="translate(4, 4)">
    <!-- Document base -->
    <rect x="8" y="6" width="28" height="36" rx="3" fill="#2563EB" opacity="0.15" stroke="#2563EB" stroke-width="2"/>
    <rect x="14" y="14" width="16" height="2" rx="1" fill="#2563EB" opacity="0.5"/>
    <rect x="14" y="20" width="12" height="2" rx="1" fill="#2563EB" opacity="0.4"/>
    <rect x="14" y="26" width="14" height="2" rx="1" fill="#2563EB" opacity="0.3"/>
    <!-- Corner fold -->
    <path d="M24 6 L36 6 L36 14 L28 14 C26 14 24 12 24 10 Z" fill="#2563EB" opacity="0.25"/>
    <!-- Magnifying glass -->
    <circle cx="34" cy="32" r="12" fill="white" stroke="#2563EB" stroke-width="2.5"/>
    <circle cx="34" cy="32" r="7" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <!-- Glass handle -->
    <line x1="43" y1="41" x2="50" y2="48" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
    <!-- Checkmark inside glass -->
    <path d="M30 32 L33 35 L39 29" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text: GrabSpec -->
  <text x="68" y="40" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#1E293B">Grab</tspan><tspan fill="#2563EB">Spec</tspan>
  </text>
</svg>
